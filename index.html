<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Control Dashboard Widget</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Arial, Helvetica, sans-serif;
    color: #1f2937;
  }

  .widget {
    width: 100%;
    max-width: 900px;
    box-sizing: border-box;
    padding: 18px 22px;
    border-radius: 22px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    box-shadow: 0 8px 22px rgba(0,0,0,0.08);
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
  }

  .clock {
    font-size: 58px;
    font-weight: 800;
    letter-spacing: 2px;
    line-height: 1;
  }

  .date {
    margin-top: 8px;
    font-size: 18px;
    font-weight: 700;
    color: #374151;
  }

  .weather-main {
    text-align: right;
  }

  .location {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #111827;
  }

  .temp {
    font-size: 42px;
    font-weight: 800;
    margin-top: 4px;
  }

  .condition {
    font-size: 16px;
    color: #4b5563;
    font-weight: 600;
  }

  .section-title {
    margin-top: 18px;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 800;
    color: #374151;
    letter-spacing: 0.4px;
  }

  .forecast {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    margin-top: 8px;
  }

  .hour-card {
    background: #f9fafb;
    border-radius: 14px;
    padding: 10px 8px;
    text-align: center;
    border: 1px solid #e5e7eb;
  }

  .hour-time {
    font-size: 14px;
    font-weight: 800;
    color: #111827;
  }

  .icon {
    font-size: 28px;
    margin: 5px 0;
  }

  .hour-temp {
    font-size: 15px;
    font-weight: 800;
    color: #111827;
  }

  .rain {
    font-size: 12px;
    color: #2563eb;
    margin-top: 3px;
    font-weight: 600;
  }

  .wind {
    font-size: 12px;
    color: #4b5563;
    margin-top: 3px;
    font-weight: 600;
  }

  .updated {
    margin-top: 12px;
    font-size: 11px;
    color: #9ca3af;
    text-align: right;
  }

  @media (max-width: 800px) {
    .forecast {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (max-width: 600px) {
    .top-row {
      flex-direction: column;
      align-items: flex-start;
    }

    .weather-main {
      text-align: left;
    }

    .clock {
      font-size: 44px;
    }

    .forecast {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
</head>

<body>
  <div class="widget">
    <div class="top-row">
      <div>
        <div class="clock" id="clock">--:--:--</div>
        <div class="date" id="date">Loading date...</div>
      </div>

      <div class="weather-main">
        <div class="location">MARLAY PARK / RATHFARNHAM</div>
        <div class="temp" id="temp">--°C</div>
        <div class="condition" id="condition">Loading weather...</div>
      </div>
    </div>

    <div class="section-title">NEXT 6 HOURS</div>
    <div class="forecast" id="forecast"></div>

    <div class="updated" id="updated">Weather data loading...</div>
  </div>

<script>
  const latitude = 53.277;
  const longitude = -6.268;

  function updateClock() {
    const now = new Date();

    document.getElementById("clock").textContent = now.toLocaleTimeString("en-IE", {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false
    });

    document.getElementById("date").textContent = now.toLocaleDateString("en-IE", {
      weekday: "long",
      day: "numeric",
      month: "long",
      year: "numeric"
    });
  }

  function weatherCodeToText(code) {
    const codes = {
      0: ["☀️", "Clear sky"],
      1: ["🌤️", "Mainly clear"],
      2: ["⛅", "Partly cloudy"],
      3: ["☁️", "Overcast"],
      45: ["🌫️", "Fog"],
      48: ["🌫️", "Rime fog"],
      51: ["🌦️", "Light drizzle"],
      53: ["🌦️", "Moderate drizzle"],
      55: ["🌧️", "Dense drizzle"],
      56: ["🌧️", "Freezing drizzle"],
      57: ["🌧️", "Heavy freezing drizzle"],
      61: ["🌧️", "Slight rain"],
      63: ["🌧️", "Moderate rain"],
      65: ["🌧️", "Heavy rain"],
      66: ["🌧️", "Freezing rain"],
      67: ["🌧️", "Heavy freezing rain"],
      71: ["🌨️", "Slight snow"],
      73: ["🌨️", "Moderate snow"],
      75: ["❄️", "Heavy snow"],
      77: ["❄️", "Snow grains"],
      80: ["🌦️", "Rain showers"],
      81: ["🌧️", "Heavy showers"],
      82: ["⛈️", "Violent showers"],
      85: ["🌨️", "Snow showers"],
      86: ["❄️", "Heavy snow showers"],
      95: ["⛈️", "Thunderstorm"],
      96: ["⛈️", "Thunderstorm with hail"],
      99: ["⛈️", "Severe thunderstorm"]
    };

    return codes[code] || ["🌡️", "Weather update"];
  }

  async function loadWeather() {
    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}` +
      `&current=temperature_2m,weather_code,wind_speed_10m` +
      `&hourly=temperature_2m,precipitation_probability,weather_code,wind_speed_10m` +
      `&timezone=Europe%2FDublin`;

    try {
      const response = await fetch(url);

      if (!response.ok) {
        throw new Error("Weather response not ok");
      }

      const data = await response.json();

      const currentWeather = weatherCodeToText(data.current.weather_code);

      document.getElementById("temp").textContent =
        Math.round(data.current.temperature_2m) + "°C";

      document.getElementById("condition").textContent =
        currentWeather[1] + " | Wind " + Math.round(data.current.wind_speed_10m) + " km/h";

      const forecast = document.getElementById("forecast");
      forecast.innerHTML = "";

      const now = new Date();
      let cardsAdded = 0;

      for (let i = 0; i < data.hourly.time.length; i++) {
        const hourDate = new Date(data.hourly.time[i]);

        if (hourDate >= now && cardsAdded < 6) {
          const hourLabel = hourDate.toLocaleTimeString("en-IE", {
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
          });

          const weather = weatherCodeToText(data.hourly.weather_code[i]);

          forecast.innerHTML += `
            <div class="hour-card">
              <div class="hour-time">${hourLabel}</div>
              <div class="icon">${weather[0]}</div>
              <div class="hour-temp">${Math.round(data.hourly.temperature_2m[i])}°C</div>
              <div class="rain">Rain ${data.hourly.precipitation_probability[i]}%</div>
              <div class="wind">Wind ${Math.round(data.hourly.wind_speed_10m[i])} km/h</div>
            </div>
          `;

          cardsAdded++;
        }
      }

      const updatedTime = new Date();

      document.getElementById("updated").textContent =
        "Updated " + updatedTime.toLocaleTimeString("en-IE", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        });

    } catch (error) {
      document.getElementById("condition").textContent = "Weather unavailable";
      document.getElementById("updated").textContent = "Unable to load weather data";
    }
  }

  updateClock();
  setInterval(updateClock, 1000);

  loadWeather();
  setInterval(loadWeather, 15 * 60 * 1000);
</script>
</body>
</html>
